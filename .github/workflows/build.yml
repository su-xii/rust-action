name: build
permissions:
  contents: write
on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'
jobs:
  build:
    name: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            archive-name: rust-action-linux.tar.gz
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: rust-action-macos.tar.gz
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: rust-action-windows.7z
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --verbose --release --target ${{ matrix.target }}
        env:
          RUST_BACKTRACE: 1

      - name: Strip binary (linux and macos)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/rust-action"

      - name: Build archive
        shell: bash
        run: |
          mkdir archive
          cd archive
          if [ "${{ matrix.build }}" = "windows" ]; then
            cp "../target/${{ matrix.target }}/release/rust-action.exe" ./
            7z a "${{ matrix.archive-name }}" rust-action.exe
          else
            cp "../target/${{ matrix.target }}/release/rust-action" ./
            tar -czf "${{ matrix.archive-name }}" rust-action
          fi
      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}

  release:
    needs: build # 等待上面的 build 完成
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') # 只有在 tag 事件下才执行
    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Rename and Move Files
        run: |
          # 创建一个干净的发布目录
          mkdir final
          # 遍历下载的所有文件，把它们移动到最终目录并重命名（去掉下载时的目录结构）
          for file in dist/*/*; do
            mv "$file" "final/"
          done

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }} # 使用推送上来的标签名作为 Release 的 tag
          release_name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false

      - name: Upload Binaries to Release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          # 这里使用通配符上传 final 目录下的所有文件
          asset_path: final/


