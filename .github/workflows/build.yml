name: build
# === 定义全局变量 ===
env:
  # 核心：修改这里即可全局替换项目名
  PROJECT_NAME: rust-action 
  
  # 可选：定义归档后缀，便于维护
  LINUX_ARCHIVE_EXT: tar.gz
  WINDOWS_ARCHIVE_EXT: 7z
  MACOS_ARCHIVE_EXT: tar.gz

on:
  workflow_dispatch: {}

jobs:
  build:
    name: build
    runs-on: $
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            # === 归档名使用变量拼接 ===
            archive-name: ${{ env.PROJECT_NAME }}-linux.${{ env.LINUX_ARCHIVE_EXT }}
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: ${{ env.PROJECT_NAME }}-macos.${{ env.MACOS_ARCHIVE_EXT }}
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: ${{ env.PROJECT_NAME }}-windows.${{ env.WINDOWS_ARCHIVE_EXT }}
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          profile: minimal
          override: true
          target: ${{ matrix.target }}

      - name: Build binary
        run: cargo build --verbose --release --target ${{ matrix.target }}
        env:
          RUST_BACKTRACE: 1

      - name: Strip binary (linux and macos)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        # === 使用变量 ===
        run: strip "target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}"

      - name: Build archive
        shell: bash
        run: |
          mkdir archive
          cd archive
          if [ "${{ matrix.build }}" = "windows" ]; then
            # Windows 下文件名带 .exe 后缀
            cp "../target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}.exe" ./
            7z a "${{ matrix.archive-name }}" ${{ env.PROJECT_NAME }}.exe
          else
            cp "../target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}" ./
            tar -czf "${{ matrix.archive-name }}" ${{ env.PROJECT_NAME }}
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}
