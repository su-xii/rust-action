name: Build and Release
# === 关键：赋予工作流写入权限 ===
permissions:
  contents: write

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: $-build
    runs-on: $
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            archive-name: rust-action-linux.tar.gz
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: rust-action-macos.tar.gz
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: rust-action-windows.7z
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: $
          profile: minimal
          override: true
          target: $

      - name: Build
        run: cargo build --verbose --release --target $

      - name: Strip (Linux/Mac)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/rust-action"

      - name: Package
        shell: bash
        run: |
          mkdir archive
          cd archive
          if [ "${{ matrix.build }}" = "windows" ]; then
            cp "../target/${{ matrix.target }}/release/rust-action.exe" ./
            7z a "${{ matrix.archive-name }}" rust-action.exe
          else
            cp "../target/${{ matrix.target }}/release/rust-action" ./
            tar -czf "${{ matrix.archive-name }}" rust-action
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # === 关键：再次确保权限 ===
    permissions:
      contents: write
    steps:
      - name: Download All
        uses: actions/download-artifact@v4
        with:
          path: ./dist

      - name: Create Release
        # === 核心修复：使用这个 Action，不要用 actions/create-release ===
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          # 自动上传 dist 目录下所有的文件
          files: dist/**/*
