name: Build and Release
# === 全局权限声明 ===
permissions:
  contents: write

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: $-build
    runs-on: $
    strategy:
      matrix:
        build: [linux, macos, windows]
        include:
          - build: linux
            os: ubuntu-latest
            rust: nightly
            target: x86_64-unknown-linux-musl
            archive-name: $-linux.tar.gz
          - build: macos
            os: macos-latest
            rust: nightly
            target: x86_64-apple-darwin
            archive-name: $-macos.tar.gz
          - build: windows
            os: windows-latest
            rust: nightly-x86_64-msvc
            target: x86_64-pc-windows-msvc
            archive-name: $-windows.7z
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v2

      - name: Install Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: $
          profile: minimal
          override: true
          target: $

      - name: Build binary
        run: cargo build --verbose --release --target ${{ matrix.target }}
        env:
          RUST_BACKTRACE: 1

      - name: Strip binary (linux and macos)
        if: matrix.build == 'linux' || matrix.build == 'macos'
        run: strip "target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}"

      - name: Build archive
        shell: bash
        run: |
          mkdir archive
          cd archive
          if [ "${{ matrix.build }}" = "windows" ]; then
            cp "../target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}.exe" ./
            7z a "${{ matrix.archive-name }}" ${{ env.PROJECT_NAME }}.exe
          else
            cp "../target/${{ matrix.target }}/release/${{ env.PROJECT_NAME }}" ./
            tar -czf "${{ matrix.archive-name }}" ${{ env.PROJECT_NAME }}
          fi

      - name: Upload archive
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive-name }}
          path: archive/${{ matrix.archive-name }}

  # =============================
  # RELEASE JOB (修复后的部分)
  # =============================
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    # Job 级别权限 (双重保险)
    permissions:
      contents: write
    steps:
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Organize Files
        run: |
          mkdir -p release-assets
          # 将所有下载的文件移动到统一目录
          find dist -type f -exec mv {} release-assets/ \;

      - name: Create Release & Upload Assets
        # 使用社区标准动作，它能完美处理上传逻辑
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          # 上传所有文件
          files: release-assets/**
